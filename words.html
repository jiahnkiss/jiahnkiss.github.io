---
layout: default
title: words
---

<p><a href="{{ '/' | relative_url }}" class="back-link">&#8592;</a></p>

<div class="words-page">
  <div id="wordsList" class="words-scatter"></div>

  <div id="submitArea" class="word-submit">
    <input type="text" id="wordInput" class="word-input" placeholder="좋아하는 단어를 남겨 주세요" maxlength="20" autocomplete="off">
    <button id="submitBtn" class="word-btn">남기기</button>
  </div>

  <p id="doneMsg" class="word-done" style="display:none;">단어 모음에 참여해 주셔서 감사합니다.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
(function () {
  firebase.initializeApp({
    apiKey: "AIzaSyAFoqplDxxipGGIJmbd_gHFaFs712b5dUI",
    authDomain: "jiahnkiss.firebaseapp.com",
    projectId: "jiahnkiss",
    storageBucket: "jiahnkiss.firebasestorage.app",
    messagingSenderId: "332637553025",
    appId: "1:332637553025:web:3baac6bbce558d1c4b6880"
  });

  var db = firebase.firestore();

  // 문서 ID로 일정한 값 생성 (모든 방문자가 같은 배치로 봄)
  function seeded(id) {
    var h = 0;
    for (var i = 0; i < id.length; i++) {
      h = Math.imul(31, h) + id.charCodeAt(i) | 0;
    }
    return {
      x:    Math.abs(Math.sin(h * 127.1)),
      size: Math.abs(Math.sin(h * 183.3)),
      dur:  Math.abs(Math.sin(h * 259.4)),
      del:  Math.abs(Math.sin(h * 331.8)),
    };
  }

  // 단어 목록 실시간 표시
  db.collection('words').orderBy('timestamp', 'asc').onSnapshot(function (snapshot) {
    var list = document.getElementById('wordsList');
    list.innerHTML = '';
    snapshot.forEach(function (doc) {
      var rnd = seeded(doc.id);
      var span = document.createElement('span');
      span.className = 'word-item';
      span.textContent = doc.data().word;
      span.style.left              = (3 + rnd.x * 88) + '%';
      span.style.fontSize          = (0.6 + rnd.size * 0.28) + 'em';
      span.style.animationDuration = (5 + rnd.dur * 7) + 's';
      span.style.animationDelay    = '-' + (rnd.del * 10) + 's';
      list.appendChild(span);
    });
  });

  // 이미 제출했는지 확인
  if (localStorage.getItem('room_word_submitted')) {
    document.getElementById('submitArea').style.display = 'none';
    document.getElementById('doneMsg').style.display = 'block';
  }

  // 단어 제출
  document.getElementById('submitBtn').addEventListener('click', submit);
  document.getElementById('wordInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submit();
  });

  function submit() {
    var word = document.getElementById('wordInput').value.trim();
    if (!word) return;
    db.collection('words').add({
      word: word,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function () {
      localStorage.setItem('room_word_submitted', 'true');
      document.getElementById('submitArea').style.display = 'none';
      document.getElementById('doneMsg').style.display = 'block';
    });
  }
})();
</script>
