<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != 'home' %}{{ page.title | escape }} - {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ site.description | escape }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <main>
      {{ content }}
    </main>

    <script>
    (function () {
      var link = 'https://instagram.com/jiahnkiss';
      var animations = ['featherFloat0','featherFloat1','featherFloat2','featherFloat3'];

      var a = document.createElement('a');
      a.href = link;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'floating-feather';
      a.textContent = '🪽';

      a.style.left   = (8 + Math.random() * 80) + 'vw';
      a.style.top    = (8 + Math.random() * 80) + 'vh';
      a.style.fontSize = (2.2 + Math.random() * 0.5) + 'em';
      var anim = animations[Math.floor(Math.random() * animations.length)];
      var dur  = (7 + Math.random() * 5) + 's';
      var del  = (-Math.random() * 8) + 's';
      a.style.animationName           = anim;
      a.style.animationDuration       = dur;
      a.style.animationDelay          = del;
      a.style.webkitAnimationName     = anim;
      a.style.webkitAnimationDuration = dur;
      a.style.webkitAnimationDelay    = del;

      document.body.appendChild(a);
    })();
    </script>
  </body>
</html>
