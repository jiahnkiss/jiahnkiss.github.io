---
layout: default
title: home
---

<h1 class="site-title">{{ site.title | escape }}</h1>

{% if site.posts.size > 0 %}
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>아직 글이 없습니다.</p>
{% endif %}
