---
layout: default
title: home
---

<h1 class="site-title">{{ site.title | escape }}</h1>

<div class="spiral-container" id="spiralContainer">
  {% for post in site.posts %}
  <a class="spiral-item spiral-post" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
  {% endfor %}
  {% for i in (1..25) %}
  <span class="spiral-item spiral-dot"></span>
  {% endfor %}
</div>

<script>
(function () {
  var container = document.getElementById('spiralContainer');
  var items = container.querySelectorAll('.spiral-item');
  var n = items.length;
  var positions = [];
  var mouse = { x: -9999, y: -9999 };
  var REPEL_RADIUS = 40;
  var REPEL_STRENGTH = 8;

  function layout() {
    var W = container.offsetWidth;
    var H = container.offsetHeight;
    var cx = W / 2;
    var cy = H / 2;
    var maxR = Math.min(W, H) / 2 - 48;

    var totalAngle = 4.2 * Math.PI;
    var a = maxR * 0.12;
    var b = (maxR - a) / totalAngle;

    positions = [];
    for (var i = 0; i < n; i++) {
      var t = n > 1 ? (i / (n - 1)) * totalAngle : 0;
      var r = a + b * t;
      var angle = t - Math.PI / 2;
      var x = cx + r * Math.cos(angle);
      var y = cy + r * Math.sin(angle);
      positions.push({ x: x, y: y });
      items[i].style.transition = 'none';
      items[i].style.left = x + 'px';
      items[i].style.top = y + 'px';
    }
  }

  function attract() {
    var rect = container.getBoundingClientRect();
    var mx = mouse.x - rect.left;
    var my = mouse.y - rect.top;

    for (var i = 0; i < n; i++) {
      var ox = positions[i].x;
      var oy = positions[i].y;
      var dx = mx - ox;
      var dy = my - oy;
      var dist = Math.sqrt(dx * dx + dy * dy);

      items[i].style.transition = 'none';

      if (dist < REPEL_RADIUS && dist > 0) {
        var scale = Math.pow(i / (n - 1), 1.8);
        var force = (1 - dist / REPEL_RADIUS) * REPEL_STRENGTH * scale;
        items[i].style.left = (ox + (dx / dist) * force) + 'px';
        items[i].style.top  = (oy + (dy / dist) * force) + 'px';
      } else {
        items[i].style.left = ox + 'px';
        items[i].style.top  = oy + 'px';
      }
    }
  }

  function restore() {
    for (var i = 0; i < n; i++) {
      items[i].style.transition = 'left 0.5s ease-out, top 0.5s ease-out';
      items[i].style.left = positions[i].x + 'px';
      items[i].style.top  = positions[i].y + 'px';
    }
  }

  layout();
  window.addEventListener('resize', layout);

  window.addEventListener('mousemove', function (e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    attract();
  });

  container.addEventListener('mouseleave', function () {
    mouse.x = -9999;
    mouse.y = -9999;
    restore();
  });
})();
</script>
